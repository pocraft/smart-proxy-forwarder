name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Syntax check
        run: python3 -c "import py_compile; py_compile.compile('proxy_forwarder.py', doraise=True)"
      - name: Flake8 lint
        run: |
          pip install flake8
          flake8 proxy_forwarder.py --max-line-length=100 --extend-ignore=E121,E123,E126,E226,E241,E704,W503,W504

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run unit tests
        run: python3 -m unittest tests/test_forwarder.py -v

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install build
        run: pip install build
      - name: Build package
        run: python3 -m build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
